<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Выбор предмета</title>
  <link rel="stylesheet" href="istl.css" />
</head>
<body>
  <div class="container">
    <h1 id="main-title">505</h1>
    <!-- <a class="button" onclick="startTest('oob')">ООП</a> -->
    <a class="button" onclick="startTest('engl')">Англиский</a>
    <!-- <a class="button" onclick="startTest('fin')">Final boss</a> -->
    <!-- <a class="button" onclick="startTest('crypto')">Крипто</a> -->
    <!-- <a class="button" onclick="openFlashcards('datamining')">Data Mining (карточки)</a> -->
  </div>

  <script>
    function startTest(subject) {
      window.location.href = `test.html?subject=${subject}`;
    }
    function openFlashcards(subject) {
      window.location.href = `card.html?subject=${subject}`;
    }

    // Сменяющийся заголовок
    const titles = ['505', 'Снова тут', 'Re:zero', '...', '505'];
    let titleIndex = 0;
    const titleEl = document.getElementById('main-title');

    setInterval(() => {
      titleEl.classList.add('fading');
      setTimeout(() => {
        titleIndex = (titleIndex + 1) % titles.length;
        titleEl.textContent = titles[titleIndex];
        titleEl.classList.remove('fading');
      }, 400);
    }, 10000);
  </script>
</body>
</html>
